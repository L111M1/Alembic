# DataPipe - SFT 数据生成/清洗管线
# sft_gen_config.yaml

api:
  model: qwen-plus
  api_key: ""
  base_url: ""
  lang: en
  concurrency: 1               # number of parallel API calls
  params:
    temperature: 0.8
    max_tokens: 2048
  retry:
    max_retries: 3

strategies:
  - type: topic_driven
    weight: 0.5
    topics:
      - topic: "Python programming basics"
        weight: 3
      - topic: "Machine learning and deep learning"
        weight: 3
      - topic: "Data structures and algorithms"
        weight: 2
      - topic: "Web/API development"
        weight: 2
      - topic: "Database and SQL"
        weight: 1
      - topic: "Linux and DevOps"
        weight: 1
    total_count: 100

  - type: seed_driven
    weight: 0.3
    seed_file: ./seeds.jsonl
    example_num: 2
    target_count: 30

  - type: self_instruct
    weight: 0.2
    target_count: 20

quality:
  instruction_min_len: 5
  instruction_max_len: 2000
  output_min_len: 30
  output_max_len: 6000
  dedup: true
  remove_truncated: true

cleaner:
  remove_html: true
  remove_urls: true
  remove_emails: true
  instruction_min_len: 5
  instruction_max_len: 4000
  output_min_len: 30
  output_max_len: 8000
  max_special_char_ratio: 0.3
  max_word_repetition_ratio: 0.5
  max_char_repetition_ratio: 0.5
  dedup: true
  embedding_dedup: false                    # API-based semantic dedup (requires embedding model)
  embedding_model: "text-embedding-3-small" # model for embedding API
  embedding_similarity_threshold: 0.85      # dedup if cosine similarity >= threshold
  embedding_batch_size: 20                  # batch size for embedding API calls

output:
  path: ./generated_sft.jsonl
  format: alpaca
  checkpoint: false
