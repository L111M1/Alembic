# DataPipe - SFT 数据生成/清洗管线
# sft_gen_config.yaml

api:
  model: deepseek-v4-flash
  api_key: ""
  base_url: ""
  lang: zh
  concurrency: 10              # number of parallel API calls
  params:
    temperature: 0.8
    max_tokens: 2048
  retry:
    max_retries: 3

strategies:
  - type: topic_driven
    weight: 0.5
    topics:
      - topic: "Python 编程基础"
        weight: 3
        knowledge: "Python 是动态类型语言，支持面向对象、函数式编程。3.12+ 支持类型注解和模式匹配。常用框架：FastAPI、Django、Flask。包管理工具：pip、uv。"
      - topic: "机器学习与深度学习"
        weight: 3
        knowledge: "三大范式：监督学习、无监督学习、强化学习。常用算法：线性回归、随机森林、神经网络、Transformer。评估指标：准确率、精确率、召回率、F1、AUC-ROC。主流框架：PyTorch、scikit-learn、XGBoost。"
      - topic: "数据结构与算法"
        weight: 2
        knowledge: "基础数据结构：数组、链表、栈、队列、哈希表、树、图。排序算法：快排、归并、堆排。查找：二分查找、BFS、DFS。复杂度分析：时间/空间复杂度 Big-O。"
      - topic: "Web 与 API 开发"
        weight: 2
        knowledge: "RESTful 设计原则：资源路径、HTTP 方法、状态码。认证方式：JWT、OAuth2.0。数据库：ORM 与原生 SQL。部署：Docker、Nginx 反向代理。"
      - topic: "数据库与 SQL"
        weight: 1
        knowledge: "关系型：MySQL、PostgreSQL，ACID 事务，索引优化。非关系型：Redis（缓存）、MongoDB（文档）。SQL 基础：JOIN、GROUP BY、子查询、窗口函数。"
      - topic: "Linux 与 DevOps"
        weight: 1
        knowledge: "常用命令：文件操作、进程管理、网络排查。Shell 脚本：变量、循环、条件判断。CI/CD：GitHub Actions、GitLab CI。容器化：Dockerfile 编写、docker-compose 编排。"
    total_count: 100

  - type: seed_driven
    weight: 0.3
    seed_file: ./seeds.jsonl
    example_num: 2
    target_count: 30

  - type: self_instruct
    weight: 0.2
    target_count: 20

quality:
  instruction_min_len: 5
  instruction_max_len: 2000
  output_min_len: 30
  output_max_len: 6000
  dedup: true
  remove_truncated: true

cleaner:
  remove_html: true
  remove_urls: true
  remove_emails: true
  instruction_min_len: 5
  instruction_max_len: 4000
  output_min_len: 30
  output_max_len: 8000
  max_special_char_ratio: 0.3
  max_word_repetition_ratio: 0.5
  max_char_repetition_ratio: 0.5
  dedup: true
  embedding_dedup: false                    # API-based semantic dedup (requires embedding model)
  embedding_model: "text-embedding-3-small" # model for embedding API
  embedding_similarity_threshold: 0.85      # dedup if cosine similarity >= threshold
  embedding_batch_size: 20                  # batch size for embedding API calls

output:
  path: ./generated_sft.jsonl
  format: alpaca
  checkpoint: false
